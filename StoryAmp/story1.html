<!DOCTYPE html>
<html ⚡>
<head>
  <meta charset="utf-8">
  <title>Flores</title>
  <link rel="canonical" href="story1.html">
  <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">

  <!-- AMP boilerplate -->
  <style amp-boilerplate>
    body { visibility:hidden }
  </style>
  <noscript>
    <style amp-boilerplate>
      body { visibility: visible }
    </style>
  </noscript>

  <!-- AMP Scripts -->
  <script async src="https://cdn.ampproject.org/v0.js"></script>
  <script async custom-element="amp-story" src="https://cdn.ampproject.org/v0/amp-story-1.0.js"></script>
</head>
<body>

  <amp-story standalone
    title="Flores"
    publisher="Consultório"
    publisher-logo-src="Imagem/logo.png"
    poster-portrait-src="Imagem/bg.png"
    on="story-end:AMP.navigateTo(url=story1.html)">

    <!-- Página 1 -->
    <amp-story-page id="page1" auto-advance-after="5s">
      <amp-story-grid-layer template="fill">
        <!-- Imagem de fundo -->
        <amp-img src="imagens/hibisco-crespo.png" 
                 width="720" height="1280" 
                 layout="responsive" 
                 alt="Beauty Day"></amp-img>
      </amp-story-grid-layer>
      <amp-story-grid-layer template="vertical">
        <!-- Imagem decorativa dentro do story -->
        <amp-img src="" width="96" height="96" layout="fixed" alt="Logo"></amp-img>
      </amp-story-grid-layer>
    </amp-story-page>

    <!-- Página 2 -->
    <amp-story-page id="page2" auto-advance-after="5s">
      <amp-story-grid-layer template="fill">
        <amp-img src="imagens/orquídea-Amor-Perfeito.png" 
                 width="720" height="1280" 
                 layout="responsive" 
                 alt="Procedimentos"></amp-img>
      </amp-story-grid-layer>
      <amp-story-grid-layer template="vertical">
        <!--
        <h1>Beauty Day</h1>
        <p>Um evento exclusivo para valorizar sua beleza e autoestima.</p>
        -->
      </amp-story-grid-layer>
    </amp-story-page>

    <!-- Página 3 -->
    <amp-story-page id="page3" auto-advance-after="5s">
      <amp-story-grid-layer template="fill">
        <amp-img src="imagens/flamboyant-mirim.png" 
                 width="720" height="1280" 
                 layout="responsive" 
                 alt="Procedimentos"></amp-img>
      </amp-story-grid-layer>
      <amp-story-grid-layer template="vertical">
        <!--
        <h2>Procedimentos Exclusivos</h2>
        <p>Botox e preenchimento com segurança e conforto.</p>
        -->
      </amp-story-grid-layer>
    </amp-story-page>

    <!-- Página Final que reinicia o Story -->
    <amp-story-page id="page-end" auto-advance-after="1s">
      <amp-story-grid-layer template="fill">
        <amp-img src="imagens/hibisco-colibri.png" 
                 width="720" height="1280" 
                 layout="responsive" 
                 alt="Fim"></amp-img>
      </amp-story-grid-layer>
      <amp-story-grid-layer template="vertical">
        <h2>Recomeçando...</h2>
      </amp-story-grid-layer>
    </amp-story-page>

  </amp-story>

</body>
</html>
